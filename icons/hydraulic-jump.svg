<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
  <circle cx="32" cy="32" r="28" fill="url(#g)" opacity="0.1"/>
  <!-- channel bed -->
  <path d="M4 46 L24 46 L26 30 L56 30" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- upstream supercritical flow -->
  <line x1="6" y1="38" x2="22" y2="38" stroke="#06b6d4" stroke-width="2"/>
